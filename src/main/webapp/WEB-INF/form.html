<body>
<h2>用户信息表单</h2>
<form action="ShowParameterServlet" method="post">
    <label for="studentId">学号:</label>
    <input type="text" id="studentId" name="studentId" required><br><br>

    <label for="name">姓名:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="gender">性别:</label>
    <select id="gender" name="gender">
        <option value="男">男</option>
        <option value="女">女</option>
    </select><br><br>

    <label>爱好:</label><br>
    <input type="checkbox" id="hobby_reading" name="hobbies" value="阅读">
    <label for="hobby_reading">阅读</label><br>

    <input type="checkbox" id="hobby_sports" name="hobbies" value="运动">
    <label for="hobby_sports">运动</label><br>

    <input type="checkbox" id="hobby_travel" name="hobbies" value="旅行">
    <label for="hobby_travel">旅行</label><br><br>

    <input type="submit" value="提交">
    <input type="reset" value="取消">
</form>
</body>
